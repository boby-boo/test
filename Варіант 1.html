<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варіант 1</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .social__inner {
        margin: 50px;
      }
      .social {
        display: block;
        padding: 20px;
        width: 80px;
        border: 1px solid;
      }
      .facebook {
        background-color: #0000fe;
        border-color: #090dae;
      }
      .instagram {
        background-color: #ffc0cb;
        border-color: #f0c7cd;
      }
      .twitter {
        background-color: #01ffff;
        border-color: #43e3e3;
      }
      .youtube {
        background-color: #fe0000;
        border-color: #bc1c1c;
      }
    </style>
  </head>
  <body>
    <div class="social__inner">
      <img class="social facebook" src="/images/facebook.png" alt="facebook logo">
      <img class="social instagram" src="/images/instagram.png" alt="instagram logo">
      <img class="social twitter" src="/images/twitter.png" alt="twitter logo">
      <img class="social youtube" src="/images/youtube.png" alt="youtube logo">
    </div>
  </body>
</html>
